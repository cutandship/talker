# «стоп-стоп» — аудио-стоп (слушает только во время сессии, поэтому целевой
# FP/час можно держать мягче, а recall — важнее)
model_name: "stop_stop"
target_phrase:
  - "стоп стоп"
custom_negative_phrases: []

n_samples: 4000
n_samples_val: 400
tts_batch_size: 50
augmentation_batch_size: 16
augmentation_rounds: 2

piper_sample_generator_path: "./piper_stub"
output_dir: "./out"

rir_paths:
  - "./data/rirs"
background_paths:
  - "./data/background_16k"
background_paths_duplication_rate:
  - 1

false_positive_validation_data_path: "./data/validation_set_features.npy"

feature_data_files:
  "ACAV100M_sample": "./data/acav_partial_f32.npy"
batch_n_per_class:
  "positive": 1024
  "adversarial_negative": 1024
  "ACAV100M_sample": 1024

model_type: "dnn"
layer_size: 128
steps: 50000
max_negative_weight: 1000
target_false_positives_per_hour: 0.5
